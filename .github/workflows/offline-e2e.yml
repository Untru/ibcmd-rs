name: Offline E2E

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: offline-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENSPEC_TELEMETRY: "0"
  RUST_VERSION: "1.95.0"

jobs:
  spec:
    name: OpenSpec (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate the accepted design and specifications
        env:
          CI: "true"
          NPM_CONFIG_AUDIT: "false"
          NPM_CONFIG_FUND: "false"
        run: npx --yes @fission-ai/openspec@1.6.0 validate build-offline-converter --strict --no-interactive

  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint standalone workspace crates offline
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo clippy --locked --workspace --exclude ibcmd-rs --all-targets -- -D warnings

  offline-matrix:
    name: Offline matrix (${{ matrix.name }})
    needs: [spec, quality]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: target/release/ibcmd-rs
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: target/release/ibcmd-rs.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: Compile every standalone target offline
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo check --locked --workspace --all-targets --no-default-features

      - name: Test standalone workspace crates offline
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo test --locked --workspace --exclude ibcmd-rs

      - name: Test root integration suites offline
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo test --locked -p ibcmd-rs --test '*' --no-default-features

      - name: Build the release-shaped binary offline
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo build --locked --release --no-default-features

      - name: Generate deterministic runtime SBOM
        env:
          CARGO_NET_OFFLINE: "true"
        run: python scripts/generate_sbom.py --manifest-path Cargo.toml --output target/offline-evidence/${{ matrix.target }}.sbom.cdx.json --target ${{ matrix.target }}

      - name: Audit clean-environment release boundary
        run: python scripts/audit_release.py --binary ${{ matrix.binary }} --sbom target/offline-evidence/${{ matrix.target }}.sbom.cdx.json

      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: offline-evidence-${{ matrix.target }}
          path: target/offline-evidence/${{ matrix.target }}.sbom.cdx.json
          if-no-files-found: error
          retention-days: 14
