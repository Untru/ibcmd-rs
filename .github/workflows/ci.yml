name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

  portable:
    name: Portable (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: Windows
            os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check standalone workspace layers
        run: cargo check --locked --workspace --exclude ibcmd-rs --all-targets

      - name: Clippy standalone workspace layers
        run: cargo clippy --locked --workspace --exclude ibcmd-rs --all-targets -- -D warnings

      - name: Test standalone workspace layers
        run: cargo test --locked --workspace --exclude ibcmd-rs

      - name: Test portable root smoke
        run: cargo test --locked -p ibcmd-rs --test portable_root_smoke

      - name: Test XML dialect corpus
        run: cargo test --locked -p ibcmd-rs --test xml_profiles

  legacy-windows:
    name: Legacy Root (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check legacy root targets
        run: cargo check --locked -p ibcmd-rs --all-targets

      - name: Compile legacy root test harness
        run: cargo test --locked -p ibcmd-rs --no-run
