name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

  test:
    name: Build And Test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --locked --all-targets

      - name: Cargo test (CI-safe suite)
        run: >
          cargo test --locked --lib --quiet --
          --skip scans_real_
          --skip extracts_real_sfc_page_scroll_on_compress
          --skip round_trips_common_form_and_template_from_lab_sources
          --skip patches_command_group_metadata_blob_from_lab_xml
          --skip patches_common_command_metadata_blob_from_lab_xml
          --skip resolves_metadata_references_from_lab_sources
